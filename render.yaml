services:
  - type: web
    name: hasirumane
    runtime: node
    buildCommand: "cd server && npm install && cd ../client && npm install && npm run build"
    startCommand: "node server/server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
